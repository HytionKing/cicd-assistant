<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>通知配置 - CICD Assistant</title>
    <link rel="stylesheet" th:href="@{/vendor/tabler/css/tabler.min.css}"/>
    <link rel="stylesheet" th:href="@{/vendor/tabler-icons/tabler-icons.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="page">
    <div th:replace="~{layout :: sidebar('compare.webhooks')}"></div>
    <div class="page-wrapper">
        <div class="page-header">
            <div class="container-fluid">
                <div class="row align-items-center">
                    <div class="col"><h2 class="page-title"><i class="ti ti-bell me-2"></i>通知配置</h2></div>
                    <div class="col-auto">
                        <button id="btn-new" class="btn btn-primary"><i class="ti ti-plus me-1"></i>新建 Webhook</button>
                    </div>
                </div>
                <p class="text-secondary mt-2 mb-0 small">钉钉自定义机器人 Webhook，检测任务完成后用于推送报告。</p>
            </div>
        </div>
        <div class="page-body">
            <div class="container-fluid">
                <div class="card">
                    <div class="table-responsive">
                        <table class="table table-vcenter card-table">
                            <thead><tr>
                                <th>ID</th><th>名称</th><th>URL</th><th>启用</th>
                                <th>更新时间</th><th class="text-end">操作</th>
                            </tr></thead>
                            <tbody id="wh-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modal-wh" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="wh-modal-title">新建 Webhook</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="wh-form">
                <input type="hidden" name="id"/>
                <div class="modal-body">
                    <div class="mb-2">
                        <label class="form-label">名称</label>
                        <input class="form-control" name="name" required placeholder="如：研发群"/>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Webhook URL</label>
                        <input class="form-control" name="url" required placeholder="https://oapi.dingtalk.com/robot/send?access_token=xxx"/>
                    </div>
                    <label class="form-check form-switch">
                        <input type="checkbox" class="form-check-input" name="enabled" checked/>
                        <span class="form-check-label">启用</span>
                    </label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn me-auto" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/vendor/tabler/js/tabler.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/ui.js}"></script>
<script th:src="@{/js/compare-webhooks.js}"></script>
</body>
</html>
