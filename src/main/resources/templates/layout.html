<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(page)" class="navbar navbar-vertical navbar-expand-lg" data-bs-theme="dark">
    <div class="container-fluid">
        <h1 class="navbar-brand navbar-brand-autodark">
            <a th:href="@{/repos}" class="d-flex align-items-center text-white text-decoration-none">
                <i class="ti ti-cpu fs-3 me-2"></i>
                <span>CICD Assistant</span>
            </a>
        </h1>
        <div class="collapse navbar-collapse" id="navbar-menu">
            <ul class="navbar-nav pt-lg-3">
                <li class="nav-item" th:classappend="${page == 'repos'} ? 'active' : ''">
                    <a class="nav-link" th:href="@{/repos}">
                        <span class="nav-link-icon"><i class="ti ti-database"></i></span>
                        <span class="nav-link-title">仓库管理</span>
                    </a>
                </li>

                <th:block th:with="cmpActive=${page != null and #strings.startsWith(page, 'compare.')}">
                <li class="nav-item" th:classappend="${cmpActive} ? 'active' : ''">
                    <a class="nav-link"
                       th:classappend="${cmpActive} ? '' : 'collapsed'"
                       data-bs-toggle="collapse" href="#submenu-compare" role="button"
                       th:attr="aria-expanded=${cmpActive} ? 'true' : 'false'">
                        <span class="nav-link-icon"><i class="ti ti-git-compare"></i></span>
                        <span class="nav-link-title">合并检测</span>
                    </a>
                    <div class="collapse" id="submenu-compare"
                         th:classappend="${cmpActive} ? 'show' : ''">
                        <ul class="nav nav-pills nav-vertical">
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/compare/new}"
                                   th:classappend="${page == 'compare.new'} ? 'active' : ''">
                                    <span class="nav-link-icon"><i class="ti ti-plus"></i></span>
                                    <span class="nav-link-title">新建检测</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/compare/tasks}"
                                   th:classappend="${page == 'compare.tasks'} ? 'active' : ''">
                                    <span class="nav-link-icon"><i class="ti ti-list-check"></i></span>
                                    <span class="nav-link-title">任务列表</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/compare/contexts}"
                                   th:classappend="${page == 'compare.contexts'} ? 'active' : ''">
                                    <span class="nav-link-icon"><i class="ti ti-book"></i></span>
                                    <span class="nav-link-title">知识库</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/compare/webhooks}"
                                   th:classappend="${page == 'compare.webhooks'} ? 'active' : ''">
                                    <span class="nav-link-icon"><i class="ti ti-bell"></i></span>
                                    <span class="nav-link-title">通知配置</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </li>
                </th:block>

                <th:block th:with="lnActive=${page != null and #strings.startsWith(page, 'launch.')}">
                <li class="nav-item" th:classappend="${lnActive} ? 'active' : ''">
                    <a class="nav-link"
                       th:classappend="${lnActive} ? '' : 'collapsed'"
                       data-bs-toggle="collapse" href="#submenu-launch" role="button"
                       th:attr="aria-expanded=${lnActive} ? 'true' : 'false'">
                        <span class="nav-link-icon"><i class="ti ti-rocket"></i></span>
                        <span class="nav-link-title">代码启动</span>
                    </a>
                    <div class="collapse" id="submenu-launch"
                         th:classappend="${lnActive} ? 'show' : ''">
                        <ul class="nav nav-pills nav-vertical">
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/launch}"
                                   th:classappend="${page == 'launch.new'} ? 'active' : ''">
                                    <span class="nav-link-icon"><i class="ti ti-player-play"></i></span>
                                    <span class="nav-link-title">新建启动</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/launch/tasks}"
                                   th:classappend="${page == 'launch.tasks'} ? 'active' : ''">
                                    <span class="nav-link-icon"><i class="ti ti-list-check"></i></span>
                                    <span class="nav-link-title">任务列表</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </li>
                </th:block>
            </ul>
            <div class="mt-auto sidebar-footer"
                 th:with="feedbackUrl=${@environment.getProperty('app.feedback-url')}">
                <a th:if="${feedbackUrl != null and !feedbackUrl.isEmpty()}"
                   th:href="${feedbackUrl}"
                   target="_blank" rel="noopener" class="sidebar-footer-link" title="提交问题或建议">
                    <i class="ti ti-message-circle me-2"></i>
                    <span>意见反馈</span>
                    <i class="ti ti-external-link ms-auto opacity-50"></i>
                </a>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="sidebar-footer-link sidebar-footer-logout" title="退出登录">
                        <i class="ti ti-logout me-2"></i>
                        <span>退出</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</aside>
</body>
</html>
