<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(page)" class="navbar navbar-vertical navbar-expand-lg" data-bs-theme="dark">
    <div class="container-fluid">
        <h1 class="navbar-brand navbar-brand-autodark">
            <a th:href="@{/repos}" class="d-flex align-items-center text-white text-decoration-none">
                <i class="ti ti-cpu fs-3 me-2"></i>
                <span>CICD Assistant</span>
            </a>
        </h1>
        <div class="collapse navbar-collapse" id="navbar-menu">
            <ul class="navbar-nav pt-lg-3">
                <li class="nav-item" th:classappend="${page == 'repos'} ? 'active' : ''">
                    <a class="nav-link" th:href="@{/repos}">
                        <span class="nav-link-icon"><i class="ti ti-database"></i></span>
                        <span class="nav-link-title">仓库管理</span>
                    </a>
                </li>

                <li class="nav-item dropdown"
                    th:classappend="${page != null and #strings.startsWith(page, 'compare.')} ? 'active' : ''">
                    <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown"
                       data-bs-auto-close="false" href="#" role="button" aria-expanded="false">
                        <span class="nav-link-icon"><i class="ti ti-git-compare"></i></span>
                        <span class="nav-link-title">合并检测</span>
                    </a>
                    <div class="dropdown-menu">
                        <a class="dropdown-item" th:href="@{/compare/new}"
                           th:classappend="${page == 'compare.new'} ? 'active' : ''">
                            <i class="ti ti-plus me-2"></i>新建检测</a>
                        <a class="dropdown-item" th:href="@{/compare/tasks}"
                           th:classappend="${page == 'compare.tasks'} ? 'active' : ''">
                            <i class="ti ti-list-check me-2"></i>任务列表</a>
                        <a class="dropdown-item" th:href="@{/compare/contexts}"
                           th:classappend="${page == 'compare.contexts'} ? 'active' : ''">
                            <i class="ti ti-book me-2"></i>知识库</a>
                        <a class="dropdown-item" th:href="@{/compare/webhooks}"
                           th:classappend="${page == 'compare.webhooks'} ? 'active' : ''">
                            <i class="ti ti-bell me-2"></i>通知配置</a>
                    </div>
                </li>

                <li class="nav-item dropdown"
                    th:classappend="${page != null and #strings.startsWith(page, 'launch.')} ? 'active' : ''">
                    <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown"
                       data-bs-auto-close="false" href="#" role="button" aria-expanded="false">
                        <span class="nav-link-icon"><i class="ti ti-rocket"></i></span>
                        <span class="nav-link-title">代码启动</span>
                    </a>
                    <div class="dropdown-menu">
                        <a class="dropdown-item" th:href="@{/launch}"
                           th:classappend="${page == 'launch.new'} ? 'active' : ''">
                            <i class="ti ti-player-play me-2"></i>新建启动</a>
                        <a class="dropdown-item" th:href="@{/launch/tasks}"
                           th:classappend="${page == 'launch.tasks'} ? 'active' : ''">
                            <i class="ti ti-list-check me-2"></i>任务列表</a>
                    </div>
                </li>
            </ul>
            <div class="mt-auto pb-3 px-3">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light w-100">
                        <i class="ti ti-logout me-1"></i>退出
                    </button>
                </form>
            </div>
        </div>
    </div>
</aside>
</body>
</html>
