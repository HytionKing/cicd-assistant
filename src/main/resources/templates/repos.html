<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>仓库管理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app">
    <div th:replace="~{layout :: sidebar('repos')}"></div>
    <main class="content">
        <header class="page-header">
            <h2>仓库管理</h2>
            <button id="btn-new" class="btn primary">新建仓库</button>
        </header>

        <table class="table">
            <thead>
            <tr>
                <th>ID</th><th>名称</th><th>GitLab Host</th><th>项目路径</th>
                <th>分支前缀</th><th>认证</th><th>操作</th>
            </tr>
            </thead>
            <tbody id="repo-tbody"></tbody>
        </table>

        <div id="modal" class="modal hidden">
            <div class="modal-box">
                <h3 id="modal-title">新建仓库</h3>
                <form id="repo-form">
                    <input type="hidden" name="id"/>
                    <div class="grid-2">
                        <label>名称<input name="name" required/></label>
                        <label>Git URL<input name="gitUrl" required placeholder="https://git.example.com/group/repo.git"/></label>
                        <label>GitLab Host<input name="gitlabHost" placeholder="https://git.example.com"/></label>
                        <label>Project Path<input name="projectPath" placeholder="group/repo"/></label>
                        <label>认证类型
                            <select name="authType">
                                <option value="TOKEN">TOKEN</option>
                                <option value="PASSWORD">PASSWORD</option>
                            </select>
                        </label>
                        <label>Access Token<input name="accessToken" placeholder="留空保留原值，*** 表示已存"/></label>
                        <label>Username<input name="username"/></label>
                        <label>Password<input name="password" type="password" placeholder="留空保留原值"/></label>
                        <label>分支前缀<input name="branchPrefix" placeholder="release/, feature/ 等"/></label>
                        <label>Swagger 路径
                            <input name="swaggerPaths" placeholder="/swagger-ui/index.html,/doc.html"/>
                        </label>
                        <label>Actuator 路径<input name="actuatorPath" placeholder="/actuator/health"/></label>
                        <label>Spring Profile<input name="springProfile" placeholder="dev"/></label>
                        <label class="full">JVM 参数<input name="jvmArgs" placeholder="-Xms256m -Xmx1g"/></label>
                        <label class="full">模块列表（可选，逗号分隔；留空时启动任务走自动扫描）
                            <input name="modules" placeholder="user-service,order-service,common"/>
                        </label>
                    </div>
                    <div class="actions">
                        <button type="button" id="btn-cancel" class="btn">取消</button>
                        <button type="submit" class="btn primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/repos.js}"></script>
</body>
</html>
