<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>任务详情 - CICD Assistant</title>
    <link rel="stylesheet" th:href="@{/vendor/tabler/css/tabler.min.css}"/>
    <link rel="stylesheet" th:href="@{/vendor/tabler-icons/tabler-icons.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="page">
    <div th:replace="~{layout :: sidebar('tasks')}"></div>
    <div class="page-wrapper">
        <div class="page-header">
            <div class="container-fluid">
                <div class="row align-items-center">
                    <div class="col">
                        <h2 class="page-title">
                            <i class="ti ti-clipboard-list me-2"></i>任务详情 #<span id="task-id" th:text="${taskId}"></span>
                        </h2>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{/tasks}" class="btn"><i class="ti ti-arrow-left me-1"></i>返回</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="page-body">
            <div class="container-fluid">
                <div class="card mb-3">
                    <div class="card-body" id="task-summary"></div>
                </div>

                <div class="card">
                    <div class="table-responsive">
                        <table class="table table-vcenter card-table">
                            <thead>
                            <tr>
                                <th>分支</th><th>模块</th><th>状态</th><th>端口</th><th>PID</th>
                                <th>保活到</th><th>Swagger</th><th>错误</th><th class="text-end">操作</th>
                            </tr>
                            </thead>
                            <tbody id="modules-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 日志查看模态框 -->
<div class="modal modal-blur fade" id="log-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="log-title">日志</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <ul class="nav nav-pills mb-2">
                    <li class="nav-item"><a class="nav-link active log-tab" data-type="run" href="#">运行日志</a></li>
                    <li class="nav-item"><a class="nav-link log-tab" data-type="build" href="#">编译日志</a></li>
                </ul>
                <pre id="log-content" class="log-box mb-0"></pre>
            </div>
            <div class="modal-footer">
                <label class="form-check form-switch me-auto">
                    <input class="form-check-input" type="checkbox" id="chk-log-auto" checked>
                    <span class="form-check-label">自动刷新 (3s)</span>
                </label>
                <button id="btn-log-refresh" class="btn"><i class="ti ti-refresh me-1"></i>刷新</button>
                <button class="btn" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/vendor/tabler/js/tabler.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/task-detail.js}"></script>
</body>
</html>
