<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>任务详情</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app">
    <div th:replace="~{layout :: sidebar('tasks')}"></div>
    <main class="content">
        <header class="page-header">
            <h2>任务详情 #<span id="task-id" th:text="${taskId}"></span></h2>
            <a th:href="@{/tasks}" class="btn">返回</a>
        </header>
        <div id="task-summary" class="card"></div>
        <table class="table mt">
            <thead>
            <tr>
                <th>分支</th><th>模块</th><th>状态</th><th>端口</th><th>PID</th>
                <th>保活到</th><th>Swagger</th><th>错误</th><th>操作</th>
            </tr>
            </thead>
            <tbody id="modules-tbody"></tbody>
        </table>

        <div id="log-modal" class="modal hidden">
            <div class="modal-box wide">
                <h3 id="log-title">日志</h3>
                <div class="log-tabs">
                    <button data-type="run" class="tab active">运行日志</button>
                    <button data-type="build" class="tab">编译日志</button>
                </div>
                <pre id="log-content" class="log"></pre>
                <div class="actions">
                    <label class="auto-refresh">
                        <input type="checkbox" id="chk-log-auto" checked/> 自动刷新(3s)
                    </label>
                    <button id="btn-log-refresh" class="btn">刷新</button>
                    <button id="btn-log-close" class="btn">关闭</button>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/task-detail.js}"></script>
</body>
</html>
