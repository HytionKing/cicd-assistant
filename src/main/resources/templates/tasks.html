<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>任务列表 - CICD Assistant</title>
    <link rel="stylesheet" th:href="@{/vendor/tabler/css/tabler.min.css}"/>
    <link rel="stylesheet" th:href="@{/vendor/tabler-icons/tabler-icons.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="page">
    <div th:replace="~{layout :: sidebar('tasks')}"></div>
    <div class="page-wrapper">
        <div class="page-header">
            <div class="container-xl">
                <h2 class="page-title"><i class="ti ti-list-check me-2"></i>任务列表</h2>
            </div>
        </div>
        <div class="page-body">
            <div class="container-xl">
                <div class="card">
                    <div class="table-responsive">
                        <table class="table table-vcenter card-table">
                            <thead>
                            <tr>
                                <th>ID</th><th>仓库</th><th>分支</th><th>状态</th>
                                <th>创建时间</th><th>完成时间</th><th class="text-end">操作</th>
                            </tr>
                            </thead>
                            <tbody id="task-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/vendor/tabler/js/tabler.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/tasks.js}"></script>
</body>
</html>
