<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>任务列表</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app">
    <div th:replace="~{layout :: sidebar('tasks')}"></div>
    <main class="content">
        <header class="page-header">
            <h2>任务列表</h2>
        </header>
        <table class="table">
            <thead>
            <tr>
                <th>ID</th><th>仓库</th><th>分支</th><th>状态</th>
                <th>创建时间</th><th>完成时间</th><th>操作</th>
            </tr>
            </thead>
            <tbody id="task-tbody"></tbody>
        </table>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/tasks.js}"></script>
</body>
</html>
