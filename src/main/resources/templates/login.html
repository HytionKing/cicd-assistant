<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>登录 - 代码合并验证</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="login-body">
<div class="login-box">
    <h2>代码合并自助验证系统</h2>
    <form method="post" th:action="@{/login}">
        <div class="form-row">
            <label>账号</label>
            <input type="text" name="username" required autofocus/>
        </div>
        <div class="form-row">
            <label>密码</label>
            <input type="password" name="password" required/>
        </div>
        <button type="submit">登录</button>
        <p th:if="${param.error}" class="error">用户名或密码错误</p>
        <p th:if="${param.logout}" class="info">已退出</p>
    </form>
</div>
</body>
</html>
