<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>登录 - CICD Assistant</title>
    <link rel="stylesheet" th:href="@{/vendor/tabler/css/tabler.min.css}"/>
    <link rel="stylesheet" th:href="@{/vendor/tabler-icons/tabler-icons.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="d-flex flex-column bg-light">
<div class="page page-center">
    <div class="container container-tight py-4">
        <div class="text-center mb-4">
            <span class="navbar-brand-image">
                <i class="ti ti-cpu fs-1 text-primary"></i>
            </span>
            <h2 class="h2 mt-2">CICD Assistant</h2>
            <div class="text-secondary">代码合并自助验证系统</div>
        </div>
        <form class="card card-md" method="post" th:action="@{/login}" autocomplete="off">
            <div class="card-body">
                <h2 class="h2 text-center mb-4">登录</h2>
                <div class="mb-3">
                    <label class="form-label">账号</label>
                    <input type="text" name="username" class="form-control" placeholder="用户名" required autofocus/>
                </div>
                <div class="mb-2">
                    <label class="form-label">密码</label>
                    <input type="password" name="password" class="form-control" placeholder="密码" required/>
                </div>
                <div th:if="${param.error}" class="alert alert-danger mt-3 mb-0 py-2">用户名或密码错误</div>
                <div th:if="${param.logout}" class="alert alert-success mt-3 mb-0 py-2">已退出</div>
                <div class="form-footer">
                    <button type="submit" class="btn btn-primary w-100">登 录</button>
                </div>
            </div>
        </form>
    </div>
</div>
<script th:src="@{/vendor/tabler/js/tabler.min.js}"></script>
</body>
</html>
