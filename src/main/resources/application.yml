server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: cicd-assistant
  datasource:
    url: jdbc:sqlite:${app.paths.data-dir:./data}/app.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      connection-test-query: SELECT 1
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: false
  thymeleaf:
    cache: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    name: ${app.paths.log-dir:./logs}/app.log
  level:
    root: INFO
    com.cicdassistant: DEBUG
    com.cicdassistant.mapper: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  # 给最终用户展示 Swagger 链接时用的主机/IP。
  # cicd-assistant 自己探测 swagger 仍走 127.0.0.1（同机最快），但展示链接需要替换成
  # 用户浏览器能访问到的地址。本地开发留空即可（落回 127.0.0.1）；
  # 部署到内网/公网服务器时填服务器实际 IP 或域名，例如 10.0.80.123 或 cicd.example.com。
  public-host: ""
  # 侧栏底部"意见反馈"链接，贴个在线文档/腾讯文档/语雀等都行；留空走 GitHub Issues
  feedback-url: ""
  paths:
    # SQLite 数据库所在目录（app.db 会落在这里）
    data-dir: ./data
    # 应用自身日志目录（app.log 在这里）
    log-dir: ./logs
    # 任务的编译 / 运行日志目录（按 task-N/branch/ 分子目录）
    build-log-dir: ./build-logs
  auth:
    users:
      - { username: admin, password: admin123 }
    secret-key: "CicdAssistant2026"
  workspace:
    # 克隆代码的根目录，按 repo/branch 分子目录
    root: ./workspace
    keep-alive-minutes: 5
    log-retention-days: 7
  maven:
    home: ""
    settings-xml: ""
    build-args: "clean package -DskipTests"
  port-pool:
    start: 18000
    end: 18999
  task:
    max-concurrent: 2
    # 单个模块从 java -jar 启动到日志出现 "Started XxxApplication in" 的最长等待时间。
    # 这个时间包含 JVM 冷启动、Spring 容器初始化、Nacos 配置拉取、DB 连接、所有 @PostConstruct。
    # 含 Nacos / 大量 bean / DB 迁移的服务建议给到 600~900。
    startup-timeout-seconds: 600
    build-timeout-seconds: 1800
  health-check:
    actuator-path: "/actuator/health"
    swagger-paths:
      - "/swagger-ui/index.html"
      - "/swagger-ui.html"
      - "/doc.html"
    probe-interval-ms: 2000
    # 服务启动完成判定正则。默认匹配 Spring Boot 的 "Started XxxApplication in 12.34 seconds"
    # 形式（main 类名任意，不必以 Application 结尾）。如果你的服务输出格式不同可以改这里。
    started-pattern: "Started\\s+\\S+\\s+in\\s+[\\d.]+\\s+seconds"
    # 抓真实监听端口的正则，必须有捕获组返回端口数字。
    # 默认同时识别：Tomcat / Undertow / Jetty / Netty / WebServer。
    # 示例匹配："Tomcat started on port(s): 8080"、"Undertow started on port(s) 8080 (http)"
    port-pattern: "(?:Tomcat|Undertow|Jetty|Netty|WebServer)\\s+started\\s+on\\s+port(?:\\(s\\))?[:\\s]+(\\d+)"
  gitlab:
    default-branch-prefix: ""

  # 合并检测（merge verification）相关配置
  compare:
    workspace-root: ./workspace-compare
    mr-fetch-default-limit: 20
    async-pool-size: 2
    # "今天"日切参照的时区。服务器可能是 UTC，用户是北京时间，两者不一致会漏 MR。
    # 默认 Asia/Shanghai；跨国团队可改成 UTC 或自己所在时区。
    timezone: Asia/Shanghai
    llm:
      enabled: false
      base-url: ""                       # OpenAI 兼容协议，例如 http://10.x.x.x:8000
      api-key: ""
      model: "qwen2.5-coder-32b-instruct"
      timeout-seconds: 120
      max-tokens: 8192
    notify:
      dingtalk-enabled: true
      message-max-chars: 4500
