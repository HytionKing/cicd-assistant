server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: cicd-assistant
  datasource:
    url: jdbc:sqlite:./data/app.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      connection-test-query: SELECT 1
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: false
  thymeleaf:
    cache: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    name: ./logs/app.log
  level:
    root: INFO
    com.cicdassistant: DEBUG
    # mapper 包属于 com.cicdassistant，但 MyBatis 在 DEBUG 下会把每条 SQL + 参数 + 结果集都打出来，
    # 噪声很大，单独把 mapper 包降到 INFO；需要排查 SQL 时再临时调成 DEBUG。
    com.cicdassistant.mapper: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  auth:
    users:
      - { username: admin, password: admin123 }
    secret-key: "CicdAssistant2026"
  workspace:
    root: ./workspace
    keep-alive-minutes: 5
    log-retention-days: 7
  maven:
    home: ""
    settings-xml: ""
    build-args: "clean package -DskipTests"
  port-pool:
    start: 18000
    end: 18999
  task:
    max-concurrent: 2
    # 单个模块从 java -jar 启动到日志出现 "Started XxxApplication in" 的最长等待时间。
    # 这个时间包含 JVM 冷启动、Spring 容器初始化、Nacos 配置拉取、DB 连接、所有 @PostConstruct。
    # 含 Nacos / 大量 bean / DB 迁移的服务建议给到 600~900。
    startup-timeout-seconds: 600
    build-timeout-seconds: 1800
  health-check:
    actuator-path: "/actuator/health"
    swagger-paths:
      - "/swagger-ui/index.html"
      - "/swagger-ui.html"
      - "/doc.html"
    probe-interval-ms: 2000
  gitlab:
    default-branch-prefix: ""
